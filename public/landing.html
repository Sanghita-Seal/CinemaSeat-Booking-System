<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BookMySeat</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: white;

     
      background: radial-gradient(circle at top, #020617, #020617 40%, #020617),
                  linear-gradient(135deg, #020617, #0f172a);

      overflow: hidden;
    }

   
    .glow-bg::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,0.25), transparent 70%);
      top: -100px;
      left: -100px;
      filter: blur(120px);
    }

    .glow-bg::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(34,211,238,0.2), transparent 70%);
      bottom: -100px;
      right: -100px;
      filter: blur(120px);
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen relative glow-bg">

  <div class="text-center space-y-8 
              backdrop-blur-xl bg-white/5 
              p-12 rounded-3xl border border-white/10 
              shadow-[0_20px_60px_rgba(0,0,0,0.8)] 
              transition hover:scale-[1.02] duration-300">

    <!-- Title -->
    <h1 class="text-6xl font-extrabold tracking-tight 
               bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-400 
               text-transparent bg-clip-text drop-shadow-lg">
      BookMySeat 🎬
    </h1>

    <!-- Subtitle -->
    <p class="text-slate-400 text-lg tracking-wide">
      Book your seats in seconds — fast, secure, real-time
    </p>

    <!-- Buttons -->
    <div class="flex justify-center gap-6 mt-8">

      <a href="/login.html"
        class="px-8 py-3 rounded-xl font-semibold 
               bg-cyan-500/90 hover:bg-cyan-400 
               shadow-[0_0_20px_rgba(34,211,238,0.5)]
               hover:shadow-[0_0_30px_rgba(34,211,238,0.9)]
               transition duration-300">
        Login
      </a>

      <a href="/signup.html"
        class="px-8 py-3 rounded-xl font-semibold 
               bg-emerald-500/90 hover:bg-emerald-400 
               shadow-[0_0_20px_rgba(16,185,129,0.5)]
               hover:shadow-[0_0_30px_rgba(16,185,129,0.9)]
               transition duration-300">
        Sign Up
      </a>

    </div>

    <!-- Extra subtle footer -->
    <p class="text-xs text-slate-500 pt-4">
      Built for seamless cinema booking experience
    </p>

  </div>

<script>
const token = localStorage.getItem("token");

if (token) {
  window.location.href = "/index.html";
}
</script>

</body>
</html>
